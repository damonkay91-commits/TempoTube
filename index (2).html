<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BPM PRO | CRT-EDITION</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --h: 0; 
    --s: 100%;
    --l: 50%;
    --lcd: hsl(var(--h), var(--s), var(--l));
    --lcd-dim: hsl(var(--h), var(--s), 10%);
    /* Incandescent Glow Layer */
    --lcd-glow: hsla(var(--h), var(--s), var(--l), 0.5);
    --lcd-bloom: hsla(var(--h), var(--s), var(--l), 0.2);
    --bg: #030303;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--lcd);
    font-family: 'Share Tech Mono', monospace;
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
  }

  /* CRT Screen FX Layer */
  body::after {
    content: " ";
    display: block;
    position: absolute;
    top: 0; left: 0; bottom: 0; right: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
    z-index: 200;
    background-size: 100% 3px, 3px 100%;
    pointer-events: none;
    opacity: 0.6;
  }

  /* Screen Vignette & Curve */
  .crt-container {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
  }

  #vuMeter {
    position: fixed;
    left: 15px;
    bottom: 25%;
    top: 25%;
    width: 10px;
    background: #0a0a0a;
    border: 1px solid #1a1a1a;
    display: flex;
    flex-direction: column-reverse;
    z-index: 10;
  }
  #vuLevel { 
    width: 100%; height: 0%; background: var(--lcd); 
    box-shadow: 0 0 20px var(--lcd); transition: height 0.1s ease-out; 
  }

  .screen { width: 100%; max-width: 500px; padding: 30px; z-index: 10; filter: blur(0.4px); }

  .bpm-wrap { position: relative; text-align: center; margin-bottom: 30px; }
  
  /* The "Bloom" effect on the numbers */
  .bpm-value {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(110px, 35vw, 175px);
    line-height: 0.9;
    letter-spacing: -0.05em;
    text-shadow: 
      0 0 10px var(--lcd-glow),
      0 0 25px var(--lcd-bloom),
      2px 0 1px rgba(255,0,0,0.2),
      -2px 0 1px rgba(0,0,255,0.2);
    transition: transform 0.05s ease-out;
  }

  .phase-container { display: flex; gap: 10px; justify-content: center; margin-bottom: 40px; }
  .bar-dot { width: 18px; height: 18px; border: 1px solid var(--lcd-dim); background: #050505; transition: all 0.1s; }
  .bar-dot.active { background: var(--lcd); border-color: var(--lcd); box-shadow: 0 0 15px var(--lcd-glow); }

  .options-box { 
    background: rgba(10, 10, 10, 0.8); 
    padding: 20px; 
    border: 1px solid rgba(255,255,255,0.05); 
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  }
  .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 11px; letter-spacing: 0.2em; }

  .btn {
    flex: 1; background: transparent; border: 1px solid var(--lcd); color: var(--lcd);
    padding: 16px; cursor: pointer; font-family: inherit; font-size: 10px; text-transform: uppercase;
    text-shadow: 0 0 5px var(--lcd-glow);
  }
  .btn.active { background: var(--lcd); color: black; font-weight: bold; box-shadow: 0 0 15px var(--lcd-glow); }
  
  #toggleLandscape {
    position: fixed; top: 25px; right: 25px; z-index: 250;
    width: 44px; height: 44px; border-radius: 50%; opacity: 0.3; background: none; border: 1px solid var(--lcd); color: var(--lcd);
  }

  body.landscape-mode .options-box, body.landscape-mode .phase-container, body.landscape-mode #vuMeter, body.landscape-mode .controls-row { display: none; }
  body.landscape-mode .bpm-value { font-size: 80vh; }

  #beatFlash { 
    position: fixed; inset: 0; background: var(--lcd); 
    opacity: 0; pointer-events: none; z-index: 5; 
    mix-blend-mode: screen; 
  }
  
  input[type="color"] { background: none; border: 1px solid #333; cursor: pointer; width: 60px; height: 35px; }

  /* Pulse Animation */
  @keyframes crt-pulse {
    0% { filter: brightness(1) contrast(1); }
    50% { filter: brightness(1.2) contrast(1.1); }
    100% { filter: brightness(1) contrast(1); }
  }
  .pulse { animation: crt-pulse 0.1s ease-out; }
</style>
</head>
<body>

<div class="crt-container">
  <div id="beatFlash"></div>
  <div id="vuMeter"><div id="vuLevel"></div></div>
  <button id="toggleLandscape">⛶</button>

  <div class="screen" id="mainScreen">
    <div class="bpm-wrap">
      <div class="bpm-value" id="bpmDisplay">---</div>
    </div>

    <div class="phase-container" id="phaseDots"></div>

    <div class="options-box">
      <div class="row">
        <span>TUBE COLOR</span>
        <input type="color" id="colorPicker" value="#ff1a1a">
      </div>
      <div class="row">
          <span>FX MODE</span>
          <div style="display:flex; gap:8px; flex:0.75">
              <button class="btn active" id="modeStatic">STATIC</button>
              <button class="btn" id="modeMorph">MORPH</button>
          </div>
      </div>
    </div>

    <div class="controls-row" style="display:flex; gap:12px; margin-top:25px;">
      <button class="btn" id="startBtn" style="flex:1.5; border-width: 2px;">▶ LISTEN</button>
      <button class="btn" id="tapBtn" style="flex:1">TAP / SYNC</button>
    </div>
  </div>
</div>

<script>
let audioCtx, analyser, running = false, morphMode = false;
let bar = 0, beat = 0, lastTime = 0, ioi = [];
let currentHue = 0;

const bpmEl = document.getElementById('bpmDisplay');
const vuEl = document.getElementById('vuLevel');
const flashEl = document.getElementById('beatFlash');
const mainScreen = document.getElementById('mainScreen');
const root = document.documentElement;

for(let i=0; i<8; i++) {
  const d = document.createElement('div');
  d.className = 'bar-dot';
  document.getElementById('phaseDots').appendChild(d);
}

function hexToHue(hex) {
    let r = parseInt(hex.slice(1,3), 16) / 255;
    let g = parseInt(hex.slice(3,5), 16) / 255;
    let b = parseInt(hex.slice(5,7), 16) / 255;
    let max = Math.max(r, g, b), min = Math.min(r, g, b);
    let h;
    if (max == min) h = 0;
    else {
        let d = max - min;
        switch (max) {
            case r: h = (g - b) / d + (g < b ? 6 : 0); break;
            case g: h = (b - r) / d + 2; break;
            case b: h = (r - g) / d + 4; break;
        }
        h /= 6;
    }
    return h * 360;
}

function triggerBeat() {
    flashEl.style.opacity = "0.1";
    bpmEl.style.transform = "scale(1.06) skewX(-1deg)";
    mainScreen.classList.add('pulse');
    
    setTimeout(() => { 
        flashEl.style.opacity = "0"; 
        bpmEl.style.transform = "scale(1) skewX(0deg)";
        mainScreen.classList.remove('pulse');
    }, 80);

    const now = performance.now() / 1000;
    if (lastTime > 0) {
        const gap = now - lastTime;
        if (gap > 0.3 && gap < 0.8) {
            ioi.push(gap);
            if (ioi.length > 10) ioi.shift();
            const med = ioi.slice().sort((a,b)=>a-b)[Math.floor(ioi.length/2)];
            bpmEl.textContent = Math.round(60/med);

            beat = (beat + 1) % 4;
            if (beat === 0) {
                bar = (bar % 8) + 1;
                document.querySelectorAll('.bar-dot').forEach((d, i) => d.classList.toggle('active', i < bar));
            }
        }
    }
    lastTime = now;
}

async function start() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        audioCtx.createMediaStreamSource(stream).connect(analyser);
        running = true;
        document.getElementById('startBtn').textContent = "■ STOP";
        document.getElementById('startBtn').classList.add('active');
        loop();
    } catch(e) { alert("Microphone required for analysis."); }
}

function loop() {
    if (!running && !morphMode) return; 
    requestAnimationFrame(loop);

    if (morphMode) {
        currentHue = (currentHue + 0.35) % 360;
        root.style.setProperty('--h', currentHue);
    }

    if (running) {
        const data = new Float32Array(analyser.frequencyBinCount);
        analyser.getFloatFrequencyData(data);
        let energy = 0;
        for(let i=1; i<5; i++) energy += Math.pow(10, data[i]/20);
        vuEl.style.height = Math.min(100, energy * 115) + "%";
        if (energy > 0.76 && (performance.now() - (lastTime*1000) > 310)) triggerBeat();
    }
}

document.getElementById('startBtn').onclick = () => { 
    if(running) { running = false; document.getElementById('startBtn').textContent = "▶ LISTEN"; document.getElementById('startBtn').classList.remove('active'); } 
    else start(); 
};

document.getElementById('tapBtn').onclick = () => triggerBeat();
document.getElementById('toggleLandscape').onclick = () => document.body.classList.toggle('landscape-mode');

document.getElementById('colorPicker').oninput = (e) => {
    morphMode = false;
    document.getElementById('modeStatic').classList.add('active');
    document.getElementById('modeMorph').classList.remove('active');
    currentHue = hexToHue(e.target.value);
    root.style.setProperty('--h', currentHue);
};

document.getElementById('modeMorph').onclick = () => { 
    morphMode = true; 
    document.getElementById('modeMorph').classList.add('active'); 
    document.getElementById('modeStatic').classList.remove('active'); 
    loop();
};

document.getElementById('modeStatic').onclick = () => { 
    morphMode = false; 
    document.getElementById('modeStatic').classList.add('active'); 
    document.getElementById('modeMorph').classList.remove('active'); 
};

root.style.setProperty('--h', hexToHue("#ff1a1a"));
</script>
</body>
</html>
